name: Build Kiro Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build CSS
        run: npx @tailwindcss/cli -i src/input.css -o src/style.css --minify

      - name: Build Tauri (release)
        working-directory: src-tauri
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp src-tauri/target/${{ matrix.target }}/release/kiro-manager dist/KiroManager-${{ matrix.target }}
          chmod +x dist/KiroManager-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiroManager-${{ matrix.target }}
          path: dist/KiroManager-${{ matrix.target }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build CSS
        run: npx @tailwindcss/cli -i src/input.css -o src/style.css --minify

      - name: Build Tauri (release)
        working-directory: src-tauri
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiroManager-windows-x86_64
          path: src-tauri/target/release/kiro-manager.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/KiroManager-aarch64-apple-darwin/KiroManager-aarch64-apple-darwin
            artifacts/KiroManager-x86_64-apple-darwin/KiroManager-x86_64-apple-darwin
            artifacts/KiroManager-windows-x86_64/kiro-manager.exe
          generate_release_notes: true

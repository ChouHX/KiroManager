<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiro Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col text-gray-200 text-xs overflow-hidden select-none">

  <!-- 顶部工具栏 -->
  <nav class="flex items-center gap-2 px-4 py-2 border-b border-border" style="background:#0d1018">
    <span class="text-sm font-semibold text-gray-100 tracking-tight">Kiro Manager</span>
    <div class="flex-1"></div>
    <button onclick="importLocal()" class="btn inline-flex items-center gap-1.5"><span id="icon-download"></span> 本地导入</button>
    <button onclick="importJson()" class="btn inline-flex items-center gap-1.5"><span id="icon-folder"></span> JSON导入</button>
    <button onclick="exportJson()" class="btn inline-flex items-center gap-1.5"><span id="icon-save"></span> 导出</button>
    <div class="w-px h-4 bg-border mx-0.5"></div>
    <button onclick="healthCheck()" class="btn inline-flex items-center gap-1.5"><span id="icon-heart"></span> 全部检查</button>
    <button onclick="enableOverageAll()" class="btn inline-flex items-center gap-1.5 text-yellow-400"><span id="icon-zap"></span> 一键超额</button>
  </nav>

  <!-- 主内容区 -->
  <div class="flex flex-1 overflow-hidden">

    <!-- 左侧：本地状态 -->
    <aside class="w-[260px] shrink-0 border-r border-border overflow-y-auto p-3 flex flex-col gap-2" style="background:#0d1018">
      <div class="flex items-center justify-between mb-1">
        <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-wider">本地 Kiro</span>
        <div class="flex gap-1">
          <button onclick="reloadLocal()" class="card-btn p-1" title="刷新"><span class="icon-refresh"></span></button>
          <button onclick="refreshLocalToken()" class="card-btn p-1" title="刷新Token"><span class="icon-key"></span></button>
          <button onclick="clearLocalToken()" class="card-btn danger p-1" title="清除"><span class="icon-eraser"></span></button>
        </div>
      </div>
      <div id="local-content">
        <p class="text-gray-500 text-center py-4 text-[11px]">加载中...</p>
      </div>

      <!-- 自动刷新 -->
      <div class="mt-auto pt-3 border-t border-border/50">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-[10px] text-gray-500 uppercase tracking-wider">自动刷新</span>
          <span id="countdown" class="text-[10px] font-mono text-gray-400">--:--</span>
        </div>
        <div class="flex items-center gap-1.5">
          <select id="refresh-interval" class="bg-card border border-border rounded px-1.5 py-0.5 text-[10px] text-gray-300 w-full" onchange="setAutoRefresh()">
            <option value="0">关闭</option>
            <option value="30">30 分钟</option>
            <option value="60" selected>60 分钟</option>
            <option value="120">2 小时</option>
          </select>
        </div>
        <div id="refresh-status" class="text-[9px] text-gray-600 mt-1"></div>
      </div>
    </aside>

    <!-- 右侧：账号卡片列表 -->
    <main id="cards-container" class="flex-1 overflow-y-auto p-4">
      <div class="text-center text-gray-500 py-16 text-sm">暂无账号，请点击上方按钮导入</div>
    </main>

  </div>

  <!-- Toast 容器 -->
  <div id="toast-container" class="fixed top-12 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- 全局 Loading 遮罩 -->
  <div id="loading-overlay" class="fixed inset-0 z-40 bg-black/40 flex items-center justify-center hidden">
    <div class="bg-card border border-border rounded-xl px-6 py-4 flex items-center gap-3 shadow-2xl">
      <div class="spinner"></div>
      <span id="loading-text" class="text-sm text-gray-200">处理中...</span>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
